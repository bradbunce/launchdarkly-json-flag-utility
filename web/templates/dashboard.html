<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchDarkly JSON Flag Utility</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>

<body>
    <header>
        <h1>🚀 LaunchDarkly JSON Flag Utility</h1>
    </header>

    <main>
        <div id="app-container" hx-get="/load" hx-trigger="load" hx-swap="innerHTML">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading projects and flags from LaunchDarkly...</p>
            </div>
        </div>
    </main>
</body>

</html>
