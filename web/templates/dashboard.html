<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchDarkly JSON Flag Utility</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>

<body>
    <header>
        <h1>🚀 LaunchDarkly JSON Flag Utility</h1>
    </header>

    <main>
        <div class="toolbar">
            <div class="project-selector">
                <label for="project-select">Project:</label>
                <select id="project-select" name="project_key" hx-post="/switch-project" hx-target="#flag-list"
                    hx-swap="innerHTML" hx-indicator="#project-spinner">
                    {% for project in projects %}
                    <option value="{{ project.key }}" {{ 'selected' if project.key==project_key else '' }}>
                        {{ project.name }} ({{ project.key }})
                    </option>
                    {% endfor %}
                </select>
                <span id="project-spinner" class="htmx-indicator">Loading...</span>
            </div>

            <button hx-post="/validate" hx-target="#flag-list" hx-swap="innerHTML" class="btn btn-primary">
                🔄 Refresh & Validate
            </button>
        </div>

        <div id="flag-list">
            {% include "partials/flag_list.html" %}
        </div>
    </main>
</body>

</html>
